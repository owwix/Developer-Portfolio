<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alexander Okonkwo | Software Engineer</title>
    <meta
      name="description"
      content="Portfolio of Alexander Okonkwo, a full-stack software engineer building scalable web applications with React, Next.js, TypeScript, and cloud technologies."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://alexanderok.dev/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Alexander Okonkwo Portfolio" />
    <meta property="og:title" content="Alexander Okonkwo | Software Engineer" />
    <meta
      property="og:description"
      content="Full-stack software engineer specializing in React, Next.js, and scalable web applications."
    />
    <meta property="og:url" content="https://alexanderok.dev/" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Alexander Okonkwo | Software Engineer" />
    <meta
      name="twitter:description"
      content="Full-stack software engineer specializing in React, Next.js, and scalable web applications."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <canvas id="network-bg" aria-hidden="true"></canvas>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <main class="container">
      <header class="hero card reveal">
        <div class="hero-main">
          <img id="avatar" class="avatar" src="" alt="Profile photo" hidden />
          <div>
            <h1 id="name">Loading...</h1>
            <p id="headline" class="headline"></p>
            <p id="bio" class="bio"></p>
          </div>
        </div>
        <div id="links" class="links"></div>
      </header>

      <section class="grid">
        <article class="card reveal">
          <h2>Projects</h2>
          <div id="projects" class="stack"></div>
        </article>

        <article class="card reveal">
          <h2>Skills</h2>
          <div id="skills" class="stack"></div>
        </article>

        <article class="card reveal full">
          <h2>Experience</h2>
          <div id="experiences" class="stack"></div>
        </article>

        <article class="card reveal full">
          <h2>Education</h2>
          <div id="education" class="stack"></div>
        </article>

        <article class="card reveal full">
          <h2>Lab / Notes</h2>
          <div id="blogs" class="stack"></div>
        </article>
      </section>
    </main>

    <template id="empty-state">
      <p class="muted">No content yet.</p>
    </template>

    <script src="/app.js" defer></script>
  </body>
</html>
